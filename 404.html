<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>404 — Not Found · Yahavi Forge</title>
<meta name="robots" content="noindex, nofollow" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --ink: #0a0a0a; --paper: #faf6e9; --pink: #ff2e63; --yellow: #ffea00;
    --font-display: 'Oswald', sans-serif; --font-mono: 'JetBrains Mono', monospace;
  }
  body {
    background: var(--paper); color: var(--ink);
    font-family: var(--font-mono); min-height: 100vh;
    display: flex; align-items: center; justify-content: center; padding: 24px;
  }
  .err-card {
    max-width: 480px; text-align: center;
  }
  .err-num {
    font-family: var(--font-display); font-size: clamp(96px, 20vw, 160px);
    line-height: 1; letter-spacing: -0.04em; color: var(--pink);
    text-shadow: 6px 6px 0 var(--ink);
  }
  .err-title {
    font-family: var(--font-display); font-size: 28px; text-transform: uppercase;
    letter-spacing: -0.02em; margin: 14px 0 10px;
  }
  .err-sub {
    font-size: 13px; line-height: 1.6; color: #555; margin-bottom: 28px;
  }
  .err-links { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
  .err-links a {
    font-size: 12px; font-weight: 800; letter-spacing: 0.12em; text-transform: uppercase;
    padding: 10px 18px; text-decoration: none;
    border: 3px solid var(--ink); color: var(--ink); background: var(--paper);
    box-shadow: 3px 3px 0 var(--ink);
  }
  .err-links a.primary { background: var(--yellow); }
  .err-links a:hover { background: var(--yellow); }
  .err-mark {
    font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase;
    color: #aaa; margin-bottom: 18px;
  }
</style>
</head>
<body>
<div class="err-card">
  <div class="err-mark">▸ YAHAVI FORGE · BY HACKKNOW</div>
  <div class="err-num">404</div>
  <h1 class="err-title">Page not found.</h1>
  <p class="err-sub">
    This path doesn't exist — or has moved.<br>
    If you followed a link, let us know at <a href="mailto:team@hackknow.com">team@hackknow.com</a>.
  </p>
  <div class="err-links">
    <a href="/" class="primary">▸ Home</a>
    <a href="/app">▸ Open App</a>
    <a href="/pricing">▸ Pricing</a>
  </div>
</div>
</body>
</html>
