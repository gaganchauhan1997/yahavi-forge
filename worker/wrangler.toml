name       = "yahavi-billing"
main       = "billing.js"
compatibility_date = "2024-09-23"

# Routes — attach this Worker to forge.hackknow.com/api/billing/*
# Make sure forge.hackknow.com is on Cloudflare and proxied (orange cloud)
[[routes]]
pattern = "forge.hackknow.com/api/billing/*"
zone_name = "hackknow.com"

# Secrets are set via CLI — NEVER hardcode here:
#   npx wrangler secret put RAZORPAY_KEY_ID
#   npx wrangler secret put RAZORPAY_KEY_SECRET
#
# Or from CF dashboard: Workers → yahavi-billing → Settings → Variables → Add secret
